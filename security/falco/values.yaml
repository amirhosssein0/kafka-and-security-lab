tty: true
customRules:
  custom-rules.yaml: |
    - rule: Unexpected Write to Filesystem in Notification Apps
      desc: Detects any write attempt inside producer, consumer, or dlq-handler containers
      condition: >
        open_write
        and container
        and k8s.ns.name = "notifications"
      output: >
        Unexpected filesystem write in notification-system container
        (user=%user.name user_uid=%user.uid command=%proc.cmdline file=%fd.name
        container=%container.name pod=%k8s.pod.name namespace=%k8s.ns.name)
      priority: WARNING
      tags: [filesystem, notifications]
    - rule: Unexpected Outbound Connection from Notification Apps
      desc: Detects outbound connections from notification-system pods outside expected ports
      condition: >
        outbound
        and container
        and k8s.ns.name = "notifications"
        and not fd.sport in (9092, 587, 465, 25, 53)
      output: >
        Unexpected outbound connection from notification-system container
        (command=%proc.cmdline connection=%fd.name container=%container.name
        pod=%k8s.pod.name namespace=%k8s.ns.name)
      priority: WARNING
      tags: [network, notifications]