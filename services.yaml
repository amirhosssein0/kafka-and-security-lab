# ============================================
# Services Cheatsheet
# CKA Practice - Day 15
# ============================================


# -----------------------------------------------
# ClusterIP (default)
# -----------------------------------------------
# فقط داخل cluster قابل دسترسه

# imperative:
kubectl expose deploy web --name=my-svc --port=80

---
apiVersion: v1
kind: Service
metadata:
  name: my-svc
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
  - port: 80
    targetPort: 80


# -----------------------------------------------
# NodePort
# -----------------------------------------------
# از خارج cluster از طریق IP نود قابل دسترسه

# imperative (dry-run برای اضافه کردن nodePort):
kubectl expose deploy web --name=my-np-svc --type=NodePort --port=80 --dry-run=client -o yaml > svc.yaml
# بعد nodePort رو اضافه کن

---
apiVersion: v1
kind: Service
metadata:
  name: my-np-svc
spec:
  type: NodePort
  selector:
    app: web
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080    # بین 30000-32767


# -----------------------------------------------
# LoadBalancer
# -----------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: my-lb-svc
spec:
  type: LoadBalancer
  selector:
    app: web
  ports:
  - port: 80
    targetPort: 80


# -----------------------------------------------
# Service Discovery — DNS
# -----------------------------------------------
# format کوتاه (فقط همون namespace):
# http://my-svc

# format کامل (از هر namespace):
# http://my-svc.default.svc.cluster.local
# http://<service>.<namespace>.svc.cluster.local

# تست از داخل pod:
# kubectl run test --image=busybox --rm -it -- sh
# wget -qO- http://my-svc
# wget -qO- http://my-svc.default.svc.cluster.local


# -----------------------------------------------
# port-forward برای تست
# -----------------------------------------------
# kubectl port-forward svc/my-svc 8080:80
# kubectl port-forward deploy/web 8080:80


# -----------------------------------------------
# دستورات مفید
# -----------------------------------------------
# kubectl get svc
# kubectl describe svc my-svc
# kubectl get endpoints my-svc
