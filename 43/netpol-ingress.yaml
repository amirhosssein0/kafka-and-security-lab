# ============================================
# NetworkPolicy — Ingress Rules Cheatsheet
# CKA Practice - Day 17
# ============================================


# -----------------------------------------------
# NetworkPolicy — ingress از یه pod خاص
# -----------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: db-netpol
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: db          # این policy روی db اعمال میشه
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: backend  # فقط از backend
    ports:
    - protocol: TCP
      port: 5432        # فقط روی این port


# -----------------------------------------------
# NetworkPolicy — ingress از چند pod (OR)
# -----------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: db-netpol-multi
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: db
  policyTypes:
  - Ingress
  ingress:
  - from:                      # rule اول
    - podSelector:
        matchLabels:
          app: backend
    ports:
    - protocol: TCP
      port: 5432
  - from:                      # rule دوم (OR)
    - podSelector:
        matchLabels:
          app: frontend
    ports:
    - protocol: TCP
      port: 80


# -----------------------------------------------
# نکته مهم — AND vs OR
# -----------------------------------------------
# خط تیره جدا (-) = OR
# زیر هم بدون خط تیره = AND

# OR — از این namespace یا از این pod:
# ingress:
# - from:
#   - namespaceSelector:
#       matchLabels:
#         env: prod
#   - podSelector:
#       matchLabels:
#         app: backend

# AND — از این pod که داخل این namespace باشه:
# ingress:
# - from:
#   - namespaceSelector:
#       matchLabels:
#         env: prod
#     podSelector:
#       matchLabels:
#         app: backend


# -----------------------------------------------
# تست
# -----------------------------------------------
# kubectl get networkpolicy
# kubectl describe networkpolicy db-netpol

# تست اتصال:
# kubectl exec <pod> -- curl <IP>:<port>
# timeout = block شده
# سریع جواب داد = مجازه
