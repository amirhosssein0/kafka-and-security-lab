apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apps-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: "nginx"
  defaultBackend:            # اگه هیچ path ای match نشد
    service:
      name: random-number-client-svc
      port:
        number: 8055
  rules:
  - host: app
    http:
      paths:
      - path: /random
        pathType: Prefix
        backend:
          service:
            name: random-number-client-svc
            port:
              number: 8055
      - path: /x
        pathType: Prefix
        backend:
          service:
            name: spacex-app
            port:
              number: 8056